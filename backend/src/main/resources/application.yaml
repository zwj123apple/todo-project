server:
  port: 8080

spring:
  application:
    name: todopro-backend

  datasource:
    url: jdbc:mysql://localhost:3306/todopro?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: todopro
    password: todopro
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

# JWT配置
jwt:
  secret: your-very-secure-secret-key-change-this-in-production-min-256-bits
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

# 文件上传配置
file:
  upload:
    dir: uploads
    chunk-dir: uploads/chunks

# 日志配置
logging:
  level:
    com.example.backend: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
