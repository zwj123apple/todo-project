server:
  port: 8080

spring:
  application:
    name: todopro-backend

  datasource:
    url: jdbc:mysql://localhost:3306/todopro?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&cachePrepStmts=true&useServerPrepStmts=true&rewriteBatchedStatements=true
    username: todopro
    password: todopro
    driver-class-name: com.mysql.cj.jdbc.Driver
    # HikariCP 连接池配置 - 企业级优化
    hikari:
      # 最大连接数（根据实际负载调整）
      maximum-pool-size: 20
      # 最小空闲连接数
      minimum-idle: 10
      # 连接最大存活时间（30分钟）
      max-lifetime: 1800000
      # 空闲连接超时时间（10分钟）
      idle-timeout: 600000
      # 获取连接超时时间（10秒，优化用户体验）
      connection-timeout: 10000
      # 连接有效性检查超时（3秒）
      validation-timeout: 3000
      # 连接池名称
      pool-name: HikariPool-TodoPro
      # 自动提交
      auto-commit: true
      # 连接泄漏检测阈值（60秒）
      leak-detection-threshold: 60000
      # 注意：不要设置connection-test-query，HikariCP会自动使用JDBC4的isValid()方法

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

    redis:
      host: localhost
      port: 6379
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

# JWT配置
jwt:
  secret: your-very-secure-secret-key-change-this-in-production-min-256-bits
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

# 文件上传配置
file:
  upload:
    dir: uploads
    chunk-dir: uploads/chunks

# 日志配置
logging:
  level:
    com.example.backend: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
